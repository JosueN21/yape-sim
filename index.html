<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yape Simulador - Pro Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', 'Inter', Arial, sans-serif;
        }

        body {
            background-color: #3e115c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 25px; 
            min-height: 100vh;
            position: relative;
        }

        .hidden { display: none !important; }

        /* --- LOGO YAPE --- */
        .top-logo {
            align-self: flex-start;
            margin-left: 20px;
            margin-bottom: 15px;
            width: 75px;
            height: auto;
            z-index: 10;
        }

        /* --- BOTÓN CERRAR (X) --- */
        .btn-close-circle {
            position: absolute;
            top: 25px;
            right: 20px;
            width: 42px;
            height: 42px;
            background-color: rgba(255, 255, 255, 0.18);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            z-index: 100;
        }
        .btn-close-circle svg { stroke: white; stroke-width: 2.5; width: 22px; height: 22px; }

        /* --- PANEL DE CONTROL --- */
        .setup-panel {
            background: #fff;
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .setup-panel input { padding: 14px; border: 1px solid #ddd; border-radius: 12px; outline: none; font-size: 15px; width: 100%; }
        
        /* --- ESTILOS PARA LOS BOTONES DE MONTO --- */
        .preset-amounts {
            display: flex;
            justify-content: space-between;
            gap: 5px; /* Reducido un poco para que quepan 5 */
            margin-top: -5px;
        }
        .btn-preset {
            flex: 1;
            background-color: #f2f5f7;
            border: 1px solid #ddd;
            color: #3b355a;
            padding: 8px 0;
            border-radius: 8px;
            font-size: 12px; /* Fuente un poco más pequeña */
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-preset:active {
            background-color: #00ba9f;
            color: white;
            border-color: #00ba9f;
        }

        .btn-generate { background-color: #00ba9f; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* --- RECIBO --- */
        .ticket-card {
            background-color: white;
            width: 350px;
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.4s ease-out;
            margin-bottom: 25px;
            z-index: 20;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .yapeaste-text { color: #742392; font-weight: 700; font-size: 24px; letter-spacing: -1.2px; }
        .share-box { color: #00ba9f; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        
        .amount-row { margin-top: 10px; color: #3b355a; display: flex; align-items: baseline; }
        .currency { font-size: 31px; font-weight: 700; margin-right: 4px; position: relative; top: -11px; letter-spacing: -1px; }
        .amount-val { font-size: 56px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; }
        
        .contact-name { font-size: 23px; font-weight: 700; color: #3b355a; margin-top: 5px; }
        
        .date-row { display: flex; align-items: center; gap: 8px; color: #6a7783; font-size: 15px; margin-top: 8px; }
        .date-item-inner { display: flex; align-items: center; gap: 5px; }
        
        hr { 
            border: 0; 
            border-top: 1.5px solid #f0f2f4; 
            margin: 8px 0; 
            width: 100%; 
        }
        
        .security-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
        .sec-label-wrapper { display: flex; align-items: center; gap: 6px; }
        .sec-label { color: #8da1ad; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        
        .info-circle {
            background-color: #00ba9f;
            color: white;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        .boxes span { background-color: #f2f5f7; width: 28px; height: 34px; display: inline-flex; justify-content: center; align-items: center; border-radius: 6px; font-weight: 700; margin-left: 3px; color: #3b355a; }

        .transaction-data { margin-top: 5px; }
        .trans-title { color: #8da1ad; font-size: 11px; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; }
        .data-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .item-value { color: #3b355a; font-weight: 700; }

        .ads-container { width: 350px; }
        .ads-container img { width: 100%; border-radius: 18px; display: block; }
    </style>
</head>
<body>

    <img src="yapesimbolo.png" alt="Yape" class="top-logo hidden" id="view-logo">

    <button class="btn-close-circle hidden" id="btn-close" onclick="showSetup()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>

    <div class="setup-panel" id="view-setup">
        <input type="text" id="inNombre" placeholder="Nombre de contacto">
        
        <div class="preset-amounts">
            <button class="btn-preset" onclick="setMonto('0.50')">0.50</button>
            <button class="btn-preset" onclick="setMonto('1.50')">1.50</button>
            <button class="btn-preset" onclick="setMonto('2')">2</button>
            <button class="btn-preset" onclick="setMonto('2.50')">2.50</button>
            <button class="btn-preset" onclick="setMonto('3')">3</button>
        </div>

        <input type="number" id="inMonto" placeholder="Monto (S/)" step="any">
        <input type="text" id="inCel" placeholder="Número de celular (opcional)" maxlength="9">
        <button class="btn-generate" onclick="generateTicket()">Generar Recibo</button>
    </div>

    <div class="ticket-card hidden" id="view-ticket">
        <div class="header-row">
            <span class="yapeaste-text">¡Yapeaste!</span>
            <div class="share-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <circle cx="18" cy="5" r="3" stroke="#00ba9f" stroke-width="2"/>
                    <circle cx="6" cy="12" r="3" stroke="#00ba9f" stroke-width="2"/>
                    <circle cx="18" cy="19" r="3" stroke="#00ba9f" stroke-width="2"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" stroke="#00ba9f" stroke-width="2"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" stroke="#00ba9f" stroke-width="2"/>
                </svg>
                Compartir
            </div>
        </div>

        <div class="amount-row">
            <span class="currency">S/</span><span class="amount-val" id="resMonto">0</span>
        </div>

        <div class="contact-name" id="resNombre">Nombre</div>
        
        <div class="date-row">
            <div class="date-item-inner">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6a7783" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span id="resFecha">---</span>
            </div>
            <span style="color: #dce2e6;">|</span>
            <div class="date-item-inner">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6a7783" stroke-width="2.2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span id="resHora">---</span>
            </div>
        </div>

        <hr>

        <div class="security-row">
            <div class="sec-label-wrapper">
                <div class="sec-label">CÓDIGO DE SEGURIDAD</div>
                <div class="info-circle">i</div>
            </div>
            <div class="boxes">
                <span id="c1">0</span><span id="c2">0</span><span id="c3">0</span>
            </div>
        </div>

        <hr>

        <div class="transaction-data">
            <div class="trans-title">DATOS DE LA TRANSACCIÓN</div>
            <div class="data-item"><span>Nro. de celular</span><span class="item-value" id="resCel">*** *** 000</span></div>
            <div class="data-item"><span>Destino</span><span class="item-value">Yape</span></div>
            <div class="data-item"><span>Nro. de operación</span><span class="item-value" id="resOp">---</span></div>
        </div>
    </div>

    <div class="ads-container hidden" id="view-ads">
        <img src="popeyes.png" alt="Publicidad">
    </div>

    <script>
        function setMonto(valor) {
            document.getElementById('inMonto').value = valor;
        }

        function generateTicket() {
            let nombre = document.getElementById('inNombre').value || "Contacto";
            if (!nombre.endsWith('*')) nombre += '*';

            const montoNum = parseFloat(document.getElementById('inMonto').value || 0);
            const montoFinal = Number.isInteger(montoNum) ? montoNum : montoNum.toFixed(2);
            
            let inCelValue = document.getElementById('inCel').value.trim();
            let numParaMostrar = "";

            if (inCelValue === "") {
                let randomCel = "9" + Math.floor(10000000 + Math.random() * 90000000).toString();
                numParaMostrar = randomCel.slice(-3);
            } else {
                numParaMostrar = inCelValue.slice(-3);
            }
            
            const celularFinal = `*** *** ${numParaMostrar}`;

            const ahora = new Date();
            const meses = ["ene.", "feb.", "mar.", "abr.", "may.", "jun.", "jul.", "ago.", "sep.", "oct.", "nov.", "dic."];
            const dia = ahora.getDate().toString().padStart(2, '0');
            const mes = meses[ahora.getMonth()];
            const anio = ahora.getFullYear();
            let h = ahora.getHours();
            const ampm = h >= 12 ? 'p. m.' : 'a. m.';
            h = h % 12 || 12;
            const m = ahora.getMinutes().toString().padStart(2, '0');

            const nroOp = Math.floor(10000000 + Math.random() * 90000000).toString();

            document.getElementById('resNombre').innerText = nombre;
            document.getElementById('resMonto').innerText = montoFinal;
            document.getElementById('resCel').innerText = celularFinal;
            document.getElementById('resFecha').innerText = `${dia} ${mes} ${anio}`;
            document.getElementById('resHora').innerText = `${h}:${m} ${ampm}`;
            document.getElementById('resOp').innerText = nroOp;
            
            const cod = Math.floor(100 + Math.random() * 900).toString();
            document.getElementById('c1').innerText = cod[0];
            document.getElementById('c2').innerText = cod[1];
            document.getElementById('c3').innerText = cod[2];

            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('view-ticket').classList.remove('hidden');
            document.getElementById('view-ads').classList.remove('hidden');
            document.getElementById('view-logo').classList.remove('hidden');
            document.getElementById('btn-close').classList.remove('hidden');
        }

        function showSetup() {
            document.getElementById('view-setup').classList.remove('hidden');
            document.getElementById('view-ticket').classList.add('hidden');
            document.getElementById('view-ads').classList.add('hidden');
            document.getElementById('view-logo').classList.add('hidden');
            document.getElementById('btn-close').classList.add('hidden');
        }
    </script>
</body>
</html>
